<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>page-pilot-skills test fixture</title>
</head>
<body>
  <!-- has a <label for="..."> — should win over everything else -->
  <label for="last-name">Last Name (label)</label>
  <input id="last-name" name="lastName" placeholder="placeholder text" type="text" />

  <!-- no <label>, has aria-label — should win over placeholder/name -->
  <input id="first-name" aria-label="First Name (aria)" placeholder="placeholder text" name="firstName" type="text" />

  <!-- no label/aria-label, has placeholder — should win over name -->
  <input id="dept" placeholder="Department (placeholder)" name="department" type="text" />

  <!-- only has a name attribute -->
  <input id="notes-field" name="internalNotes" type="text" />

  <!-- nothing at all — no label/aria-label/placeholder/name -->
  <input id="mystery-field" type="text" />

  <!-- wrapping <label> style -->
  <label id="wrap-label" style="display:block;">
    Wrapped Field Label
    <input id="wrapped-input" type="text" />
  </label>

  <!-- duplicate id: a label[for] lookup would incorrectly find the FIRST
       element's label (meant for the photo button) if the id-uniqueness
       check didn't skip it — the actual target here is the second
       duplicate, a real text field with its own placeholder as a
       fallback hint -->
  <label for="dup-field">相片拍摄:</label>
  <button id="dup-field">拍照</button>
  <label for="dup-field">Last Name:</label>
  <input id="dup-field" type="text" placeholder="Enter last name" />

  <!-- a DIFFERENT real-world bug: the target's own id IS unique, but the
       site's markup mistakenly has more than one label pointing at that
       same for= value (a copy-paste bug — this exact structure was found
       on a real site: an unrelated "相片拍摄:" form-row's label was never
       updated after being copied, leaving it pointing at the Last Name
       field below it) -->
  <div class="form-group">
    <label for="realNameField">相片拍摄:</label>
    <button id="unrelated-photo-btn">拍照</button>
  </div>
  <div class="form-group">
    <label for="realNameField">Last Name:</label>
    <input id="realNameField" type="text" />
  </div>

  <select id="country-select">
    <option value="">--</option>
    <option value="us">US</option>
    <option value="jp">JP</option>
  </select>

  <input id="agree-checkbox" type="checkbox" />

  <button id="delete-btn">Delete this record</button>
  <button id="save-btn">Save</button>

  <script type="module">
    import * as Skills from '/src/page-pilot-skills.js';
    window.Skills = Skills;
  </script>
</body>
</html>
